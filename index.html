<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 v3.5 六分制交易系统</title>
<style>
body{font-family:sans-serif;background:#0b1220;color:#fff;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
.card{background:#111a2e;padding:20px;border-radius:12px;margin-bottom:20px}
button{padding:10px 20px;border-radius:8px;border:none;margin:5px;cursor:pointer}
.buy{background:#16a34a}
.short{background:#dc2626}
.active{outline:3px solid #fff}
.result{font-size:24px;margin-top:10px}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h1>MI6 v3.5 六分制交易系统</h1>
<p>基于 Vernon Tee 交易理念构建 · 用于执行六分制交易纪律判断</p>
</div>

<div class="card">
<h3>方向选择</h3>
<button id="buyBtn" class="buy">BUY</button>
<button id="shortBtn" class="short">SHORT</button>

<h3>六分制评分</h3>
<label><input type="checkbox" class="score" value="1"> Candlestick</label><br>
<label><input type="checkbox" class="score" value="1"> Chart Pattern</label><br>
<label><input type="checkbox" class="score" value="1"> Wave</label><br>
<label><input type="checkbox" class="score" value="1"> MA</label><br>
<label><input type="checkbox" class="score" value="1"> Bollinger Band</label><br>
<label><input type="checkbox" class="score" value="1"> Fibo</label><br>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result">Score: 0/6</div>
<div id="decision"></div>
</div>

</div>

<script>
let direction = null;

document.getElementById('buyBtn').onclick = () => {
  direction = 'BUY';
  document.getElementById('buyBtn').classList.add('active');
  document.getElementById('shortBtn').classList.remove('active');
}

document.getElementById('shortBtn').onclick = () => {
  direction = 'SHORT';
  document.getElementById('shortBtn').classList.add('active');
  document.getElementById('buyBtn').classList.remove('active');
}

function calculate(){
  const scores = document.querySelectorAll('.score');
  let total = 0;

  scores.forEach(s => {
    if(s.checked) total += 1;
  });

  document.getElementById('result').innerText = `Score: ${total}/6`;

  let decision = "";

  if(total >= 5){
    decision = "TRADE";
  } else if(total === 4){
    decision = "WATCH";
  } else {
    decision = "NO TRADE";
  }

  document.getElementById('decision').innerText = `Decision: ${decision} (${direction || 'No Direction'})`;
}
</script>

</body>
</html>
