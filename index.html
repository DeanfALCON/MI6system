<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 v3.7 商业版</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.container{max-width:1200px;margin:auto;padding:20px}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  margin-bottom:20px;
}

.layout{display:grid;grid-template-columns:1fr 380px;gap:20px}

.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:bold;margin:5px}
.buy{background:#22c55e}
.short{background:#ef4444}
.active{outline:2px solid white}

.score-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;margin:10px 0}
.yes{background:#22c55e}
.no{background:#ef4444}

.score{
  font-size:60px;
  font-weight:bold;
  transition:0.3s;
}

.glow{
  box-shadow:0 0 20px #22c55e,0 0 40px #22c55e;
}

.danger{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{box-shadow:0 0 5px #ef4444}
  50%{box-shadow:0 0 20px #ef4444}
  100%{box-shadow:0 0 5px #ef4444}
}

.badge{padding:10px 20px;border-radius:20px;margin-top:10px;display:inline-block}
.trade{background:#22c55e}
.watch{background:#f59e0b}
.noTrade{background:#ef4444}

.export{
  margin-top:20px;
  padding:10px;
  background:#6366f1;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>MI6 v3.7 商业级系统</h2>
</div>

<div class="layout">

<div class="card">
<button id="buyBtn" class="btn buy active">BUY</button>
<button id="shortBtn" class="btn short">SHORT</button>
<div id="scores"></div>
</div>

<div class="card" id="decisionCard">
<div class="score" id="score">0/6</div>
<div id="decision"></div>
<div id="missing"></div>
<div class="export" onclick="exportIG()">导出 IG 字卡</div>
</div>

</div>

</div>

<script>
let direction="BUY";
let currentScore=0;

let scoreData={candlestick:0,chartpattern:0,wave:0,ma:0,bb:0,fibo:0};

const labels={candlestick:"Candlestick",chartpattern:"Chart Pattern",wave:"Wave",ma:"MA",bb:"BB",fibo:"Fibo"};

const scoresDiv=document.getElementById("scores");

Object.keys(scoreData).forEach(key=>{
 let div=document.createElement("div");
 div.className="score-row";

 let label=document.createElement("span");
 label.innerText=labels[key];

 let yes=document.createElement("button");
 yes.innerText="YES";
 yes.className="btn yes";
 yes.onclick=()=>{scoreData[key]=1;update();}

 let no=document.createElement("button");
 no.innerText="NO";
 no.className="btn no";
 no.onclick=()=>{scoreData[key]=0;update();}

 div.appendChild(label);
 div.appendChild(yes);
 div.appendChild(no);
 scoresDiv.appendChild(div);
});

buyBtn.onclick=()=>{direction="BUY";buyBtn.classList.add("active");shortBtn.classList.remove("active");update();}
shortBtn.onclick=()=>{direction="SHORT";shortBtn.classList.add("active");buyBtn.classList.remove("active");update();}

function animateScore(target){
 let start=currentScore;
 let step=setInterval(()=>{
   if(start===target){clearInterval(step);return}
   start+= start<target?1:-1;
   score.innerText=start+"/6";
 },80);
 currentScore=target;
}

function update(){
 let total=Object.values(scoreData).reduce((a,b)=>a+b,0);
 animateScore(total);

 let decision="";
 let cls="";

 let card=document.getElementById("decisionCard");
 card.classList.remove("glow","danger");

 if(total>=5){decision="TRADE";cls="trade";card.classList.add("glow")}
 else if(total===4){decision="WATCH";cls="watch"}
 else{decision="NO TRADE";cls="noTrade";card.classList.add("danger")}

 decisionDiv.innerHTML=`<div class="badge ${cls}">${decision} (${direction})</div>`;

 let missing=Object.keys(scoreData).filter(k=>scoreData[k]===0);
 missingDiv.innerText="缺少: "+missing.map(k=>labels[k]).join(", ");
}

function exportIG(){
 let text=`MI6 SYSTEM\n方向: ${direction}\n分数: ${currentScore}/6`;
 navigator.clipboard.writeText(text);
 alert("已复制 IG 文案");
}

const decisionDiv=document.getElementById("decision");
const missingDiv=document.getElementById("missing");

update();
</script>

</body>
</html>
