<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 六分交易评分器 v2</title>

<style>
body {
  background:#070b13;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

.container {
  display:flex;
  gap:20px;
}

.left, .right {
  flex:1;
  padding:20px;
  border-radius:16px;
  background:#111827;
}

.toggle-btn {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.toggle-btn.active.yes { background:#19c37d; }
.toggle-btn.active.no { background:#ef4444; }

.badge {
  padding:8px 12px;
  border-radius:999px;
}

.badge.strong { background:#19c37d; }
.badge.trade { background:#3daeff; }
.badge.watch { background:#f5b942; }
.badge.no { background:#ef4444; }

</style>
</head>

<body>

<h1>MI6 六分交易评分器 v2</h1>

<div class="container">

<!-- LEFT -->
<div class="left">

<h3>Step 1 方向</h3>
<select id="direction">
<option>BUY</option>
<option>SELL</option>
</select>

<h3>Step 2 趋势</h3>
<select id="trend">
<option value="up">上升</option>
<option value="down">下降</option>
<option value="sideways">盘整</option>
</select>

<h3>Step 3 六分评分</h3>

<div>
<p>Candle</p>
<button class="toggle-btn yes" data-key="candle" data-value="1">YES</button>
<button class="toggle-btn active no" data-key="candle" data-value="0">NO</button>
</div>

<div>
<p>Chart</p>
<button class="toggle-btn yes" data-key="chart" data-value="1">YES</button>
<button class="toggle-btn active no" data-key="chart" data-value="0">NO</button>
</div>

<div>
<p>Wave</p>
<button class="toggle-btn yes" data-key="wave" data-value="1">YES</button>
<button class="toggle-btn active no" data-key="wave" data-value="0">NO</button>
</div>

<div>
<p>MA</p>
<button class="toggle-btn yes" data-key="ma" data-value="1">YES</button>
<button class="toggle-btn active no" data-key="ma" data-value="0">NO</button>
</div>

<div>
<p>BB</p>
<button class="toggle-btn yes" data-key="bb" data-value="1">YES</button>
<button class="toggle-btn active no" data-key="bb" data-value="0">NO</button>
</div>

<div>
<p>Fibo</p>
<button class="toggle-btn yes" data-key="fibo" data-value="1">YES</button>
<button class="toggle-btn active no" data-key="fibo" data-value="0">NO</button>
</div>

<br>

<button id="calc">计算评分</button>

</div>

<!-- RIGHT -->
<div class="right">

<h2>MI6 决策终端</h2>
<div id="result" class="badge no">NO TRADE</div>

<h3 id="score">0 / 6</h3>

<div id="analysis">等待输入</div>

<br>

<button id="copy">复制摘要</button>

</div>

</div>

<script>

const state = {
candle:0, chart:0, wave:0, ma:0, bb:0, fibo:0
};

// ✅ 修复点击问题
document.querySelectorAll('.toggle-btn').forEach(btn=>{
btn.addEventListener('click',()=>{

const key = btn.dataset.key;
const value = Number(btn.dataset.value);

state[key] = value;

// reset group
btn.parentElement.querySelectorAll('.toggle-btn').forEach(b=>{
b.classList.remove('active','yes','no');
});

btn.classList.add('active', value===1?'yes':'no');

});
});

// 计算
document.getElementById('calc').onclick = ()=>{

const score = Object.values(state).reduce((a,b)=>a+b,0);

let result="NO TRADE";

if(score===6) result="STRONG TRADE";
else if(score>=5) result="TRADE";
else if(score===4) result="WATCH";

document.getElementById('score').innerText = score + " / 6";

const badge = document.getElementById('result');
badge.innerText = result;

badge.className = "badge";

if(result==="STRONG TRADE") badge.classList.add("strong");
else if(result==="TRADE") badge.classList.add("trade");
else if(result==="WATCH") badge.classList.add("watch");
else badge.classList.add("no");

document.getElementById('analysis').innerText =
"结果："+result+" | 分数："+score;

};

// ✅ 修复 join bug
document.getElementById('copy').onclick = ()=>{

const text = [
"MI6 v2",
document.getElementById('analysis').innerText
].join("\n");

navigator.clipboard.writeText(text);

alert("已复制");

};

</script>

</body>
</html>
