<!-- MI6 v3.5 PRO UI (Based on v3.3 style, cleaned logic) -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI6 v3.5 六分制交易系统</title>

<style>
body{margin:0;font-family:Arial;background:#0a0f1c;color:#fff}
.container{max-width:1200px;margin:auto;padding:20px}

.header{
  background:#111a2e;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
  border:1px solid #2a3a5a;
}

h1{margin:0}
.sub{opacity:.6;margin-top:5px}

.layout{
  display:grid;
  grid-template-columns:1fr 380px;
  gap:20px;
}

.card{
  background:#111a2e;
  padding:20px;
  border-radius:14px;
  border:1px solid #2a3a5a;
}

.btn{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
  cursor:pointer;
  font-weight:bold;
}

.buy{background:#16a34a}
.short{background:#dc2626}
.active{outline:2px solid white}

.row{display:flex;justify-content:space-between;margin:10px 0}

.yes{background:#16a34a}
.no{background:#dc2626}

.score{
  font-size:50px;
  font-weight:bold;
}

.badge{
  padding:10px;
  border-radius:20px;
  display:inline-block;
  margin-top:10px;
}

.trade{background:#16a34a}
.watch{background:#f59e0b}
.noTrade{background:#dc2626}

.missing{margin-top:10px;opacity:.7}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h1>MI6 v3.5 六分制交易系统</h1>
<div class="sub">Based on Vernon Tee · Discipline Execution Tool</div>
</div>

<div class="layout">

<!-- LEFT -->
<div class="card">
<h3>方向</h3>
<button id="buyBtn" class="btn buy active">BUY</button>
<button id="shortBtn" class="btn short">SHORT</button>

<h3>六分评分</h3>
<div id="scores"></div>
</div>

<!-- RIGHT -->
<div class="card">
<h3>MI6 Decision</h3>
<div class="score" id="score">0/6</div>
<div id="decision"></div>
<div class="missing" id="missing"></div>
</div>

</div>

</div>

<script>
let direction="BUY";

let scoreData={
 candlestick:0,
 chartpattern:0,
 wave:0,
 ma:0,
 bb:0,
 fibo:0
};

const labels={
 candlestick:"Candlestick",
 chartpattern:"Chart Pattern",
 wave:"Wave",
 ma:"MA",
 bb:"Bollinger Band",
 fibo:"Fibo"
};

const scoresDiv=document.getElementById("scores");

Object.keys(scoreData).forEach(key=>{
 let div=document.createElement("div");
 div.className="row";

 let label=document.createElement("span");
 label.innerText=labels[key];

 let yes=document.createElement("button");
 yes.innerText="YES";
 yes.className="btn yes";
 yes.onclick=()=>{scoreData[key]=1;update();}

 let no=document.createElement("button");
 no.innerText="NO";
 no.className="btn no";
 no.onclick=()=>{scoreData[key]=0;update();}

 div.appendChild(label);
 div.appendChild(yes);
 div.appendChild(no);
 scoresDiv.appendChild(div);
});

buyBtn.onclick=()=>{
 direction="BUY";
 buyBtn.classList.add("active");
 shortBtn.classList.remove("active");
 update();
}

shortBtn.onclick=()=>{
 direction="SHORT";
 shortBtn.classList.add("active");
 buyBtn.classList.remove("active");
 update();
}

function update(){
 let total=Object.values(scoreData).reduce((a,b)=>a+b,0);
 score.innerText=total+"/6";

 let decision="";
 let cls="";

 if(total>=5){decision="TRADE";cls="trade"}
 else if(total===4){decision="WATCH";cls="watch"}
 else{decision="NO TRADE";cls="noTrade"}

 document.getElementById("decision").innerHTML=
 `<div class="badge ${cls}">${decision} (${direction})</div>`;

 let missing=Object.keys(scoreData).filter(k=>scoreData[k]===0);
 document.getElementById("missing").innerText=
 "缺少: "+missing.map(k=>labels[k]).join(", ");
}

update();
</script>

</body>
</html>
